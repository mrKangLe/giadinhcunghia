name: Auto Fetch Photos
on:
  schedule:
    # Chạy 12 lần mỗi ngày (mỗi 2 tiếng 1 lần)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Giúp Bố bấm nút chạy tay nếu cần

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # Con đã thêm google-api-python-client vào đây để không bị lỗi ModuleNotFound nữa ạ
        run: |
          pip install google-auth-oauthlib google-auth-httplib2 google-auth google-api-python-client

      - name: Run fetch script
        env:
          G_CLIENT_ID: ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET: ${{ secrets.G_CLIENT_SECRET }}
          G_REFRESH_TOKEN: ${{ secrets.G_REFRESH_TOKEN }}
        run: |
          python fetch_photos.py
