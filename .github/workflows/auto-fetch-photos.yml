name: Tự Động Cập Nhật Album Gia Đình

on:
  workflow_dispatch: # Để Bố bấm tay được
  schedule:
    - cron: '0 0 * * *' # Tự chạy 0h sáng hàng ngày

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # QUAN TRỌNG: Để GitHub có quyền ghi đè file JSON
    steps:
      - uses: actions/checkout@v3
      
      - name: Chạy script lấy ảnh
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # Bố phải lưu Key trong Settings > Secrets
        run: |
          # Đây là nơi Bố gọi script Python hoặc Node.js để lấy ảnh
          # Ví dụ: python scripts/fetch_photos.py
          echo "Đang lấy ảnh từ Google Photos..."

      - name: Cập nhật file JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add photos.json
          git commit -m "Auto-update photos.json" || echo "Không có thay đổi"
          git push
