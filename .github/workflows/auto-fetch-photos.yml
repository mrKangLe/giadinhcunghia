name: Tự Động Cập Nhật Album Gia Đình
on: [workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Chạy script lấy ảnh
        env:
          G_CLIENT_ID: ${{ secrets.G_CLIENT_ID }}
          G_CLIENT_SECRET: ${{ secrets.G_CLIENT_SECRET }}
        run: |
          python3 fetch_photos.py
          
      - name: Kiểm tra file
        run: ls -la # Lệnh này giúp con kiểm tra xem file đã được tạo ra chưa
        
      - name: Đẩy file photos.json lên lại
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # Chỉ đẩy lên nếu file thực sự tồn tại
          if [ -f photos.json ]; then
            git add photos.json
            git commit -m "Cập nhật photos.json tự động"
            git push
          else
            echo "File photos.json không tồn tại, bỏ qua bước push!"
          fi
